services:
  postgres:
    image: postgres:16-alpine
    container_name: india-villages-postgres
    environment:
      POSTGRES_DB: india_villages
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d india_villages"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: india-villages-backend
    env_file:
      - ./backend/.env.example
    environment:
      DB_HOST: postgres
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run db:seed && npm start"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: india-villages-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
